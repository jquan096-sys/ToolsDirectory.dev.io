name: 🤖 Auto-Update AI Tools News (Gemini)

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tools:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🚀 Run agent_update.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agent_update.py

      - name: 💾 Commit and push data files
        run: |
          git config --global user.name "tools-bot"
          git config --global user.email "tools-bot@users.noreply.github.com"
          git add -A data/ index.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✅ No changes — nothing to commit."
            exit 0
          else
            git commit -m "🤖 Auto-update: AI tools news $(date -u '+%Y-%m-%d %H:%M UTC') [Gemini]"
            git push
            echo "✅ Pushed updated data to repo."
            exit 0
          fi
