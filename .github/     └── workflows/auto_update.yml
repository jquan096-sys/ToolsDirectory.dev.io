name: 🤖 Auto-Update AI Tools News

# ── TRIGGERS ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # Runs every day at 08:00 UTC  (adjust to your preferred time)
    - cron: "0 8 * * *"

  # Allow manual trigger from GitHub → Actions tab
  workflow_dispatch:

# ── PERMISSIONS ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to commit + push data files

# ── JOB ───────────────────────────────────────────────────────────────────────
jobs:
  update-tools:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout repo
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Set up Python
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. No extra pip installs needed (agent uses stdlib only)
      #    Uncomment below if you add requests / httpx later:
      # - name: 📦 Install dependencies
      #   run: pip install requests

      # 4. Run the agent
      - name: 🚀 Run agent_update.py
        env:
          # Optional: add ANTHROPIC_API_KEY in repo Settings → Secrets → Actions
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent_update.py

      # 5. Commit & push updated data files (only if changed)
      - name: 💾 Commit and push data files
        run: |
          git config --global user.name  "tools-bot"
          git config --global user.email "tools-bot@users.noreply.github.com"

          git add data/news.json data/tools_new.json data/meta.json

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "✅ No changes — nothing to commit."
          else
            git commit -m "🤖 Auto-update: AI tools news $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Pushed updated data to repo."
          fi
